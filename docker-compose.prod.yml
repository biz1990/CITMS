version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-citms_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citms_secure123}
      POSTGRES_DB: ${POSTGRES_DB:-citms_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - citms_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citms_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - citms_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env.prod
    networks:
      - citms_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker -l info --pool=prefork --concurrency=4
    restart: always
    depends_on:
      - backend
      - redis
    env_file:
      - .env.prod
    networks:
      - citms_net

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker beat -l info
    restart: always
    depends_on:
      - celery_worker
    env_file:
      - .env.prod
    networks:
      - citms_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - citms_net

networks:
  citms_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
